<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUMANE Wiki</title>
  <script>
    const path = window.location.pathname;
    const repoBase = '/humane-wiki/';
    if (path.startsWith(repoBase)) {
      const route = path.slice(repoBase.length);
      window.location.replace(repoBase + '#/' + route + window.location.search + window.location.hash);
    } else {
      window.location.replace(repoBase);
    }
  </script>
</head>
<body>
  Redirecting to HUMANE Wiki...
</body>
</html>
